# Render Blueprint for DealHunter staging.
# Replace all placeholder values before applying this Blueprint.
#
# Required Render workspace setup:
# - Workspace: SaveIQ
# - Billing enabled
# - Registry credential named ghcr-saveiq with access to the GHCR images

previews:
  generation: off

services:
  - type: web
    name: dealhunter-staging-api
    runtime: image
    plan: free
    region: oregon
    image:
      url: "ghcr.io/leoly5945-hash/saveiq-engine@sha256:489fee5f4fbcc35df0d1f0c7cbd6717b08b96623f23b24e2634413310420078e"
      creds:
        fromRegistryCreds:
          name: ghcr-saveiq
    dockerCommand: python -m app.server
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: APP_NAME
        value: DealHunter API
      - key: ENVIRONMENT
        value: staging
      - key: LOG_LEVEL
        value: info
      - key: API_CORS_ORIGINS
        value: "https://dealhunter-staging-web.onrender.com"
      - key: ADMIN_API_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dealhunter-staging-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: dealhunter-staging-redis
          property: connectionString

  - type: web
    name: dealhunter-staging-web
    runtime: image
    plan: free
    region: oregon
    image:
      url: "ghcr.io/leoly5945-hash/saveiq-web@sha256:cff4953c5e8b653f823ad2f40952354a0f88e4dfa131da8f1d20f7ab22af8410"
      creds:
        fromRegistryCreds:
          name: ghcr-saveiq
    dockerCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: "https://dealhunter-staging-api.onrender.com"
      - key: NEXT_PUBLIC_BRAND_NAME
        value: DealHunter
      - key: STAGING_NOINDEX
        value: "true"

  - type: keyvalue
    name: dealhunter-staging-redis
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: dealhunter-staging-postgres
    databaseName: dealhunter
    user: dealhunter
    plan: free
    region: oregon
    postgresMajorVersion: 16
    ipAllowList: []
